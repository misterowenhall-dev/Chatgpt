name: Build PianoPath APK

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK 35
        run: sdkmanager --install "platforms;android-35" "build-tools;35.0.0"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.13'

      - name: Restore Kotlin source
        run: |
          rm -f app/src/main/java/com/pianopath/app/MainActivity.java
          mkdir -p app/src/main/java/com/pianopath/app
          cat source_chunks/MainActivity.part* | base64 --decode | gzip --decompress > app/src/main/java/com/pianopath/app/MainActivity.kt

      - name: Build debug APK
        run: gradle --no-daemon assembleDebug

      - name: Prepare downloadable APK
        run: cp app/build/outputs/apk/debug/app-debug.apk PianoPath-v0.2.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: PianoPath-v0.2-APK
          path: PianoPath-v0.2.apk
          if-no-files-found: error
          retention-days: 30
