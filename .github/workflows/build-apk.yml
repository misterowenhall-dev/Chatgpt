name: Build PianoPath APK

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK 36
        run: sdkmanager --install "platforms;android-36" "build-tools;36.0.0"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.13'

      - name: Restore Kotlin source
        run: |
          rm -f app/src/main/java/com/pianopath/app/MainActivity.java
          mkdir -p app/src/main/java/com/pianopath/app
          cat source_chunks/MainActivity.part* | base64 --decode | gzip --decompress > app/src/main/java/com/pianopath/app/MainActivity.kt

      - name: Patch current Compose APIs
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('app/src/main/java/com/pianopath/app/MainActivity.kt')
          source = path.read_text()
          for old_import in (
              'import androidx.compose.foundation.layout.calculateBottomPadding\n',
              'import androidx.compose.foundation.layout.calculateTopPadding\n',
              'import androidx.compose.foundation.layout.matchParentSize\n',
              'import androidx.compose.foundation.layout.weight\n',
          ):
              source = source.replace(old_import, '')
          source = source.replace(
              'import androidx.compose.ui.draw.graphicsLayer',
              'import androidx.compose.ui.graphics.graphicsLayer'
          )
          source = source.replace(
              'Modifier.padding(top = 13.dp, horizontal = 8.dp)',
              'Modifier.padding(start = 8.dp, top = 13.dp, end = 8.dp)'
          )
          source = source.replace(
              'Modifier.padding(top = 10.dp, horizontal = 12.dp)',
              'Modifier.padding(start = 12.dp, top = 10.dp, end = 12.dp)'
          )
          source = source.replace(
              'Modifier.padding(top = 7.dp, horizontal = 14.dp)',
              'Modifier.padding(start = 14.dp, top = 7.dp, end = 14.dp)'
          )
          source = source.replace(
              'Modifier.padding(top = 10.dp, horizontal = 10.dp)',
              'Modifier.padding(start = 10.dp, top = 10.dp, end = 10.dp)'
          )
          path.write_text(source)
          PY

      - name: Build debug APK
        shell: bash
        run: |
          set +e
          gradle --no-daemon assembleDebug > build.log 2>&1
          status=$?
          if [ "$status" -ne 0 ]; then
            echo "=== COMPILER ERRORS ==="
            grep -E "(^e: |error:|FAILURE:|What went wrong|Unresolved reference|Cannot access|Type mismatch|No value passed)" build.log | tail -250 || true
            echo "=== LOG TAIL ==="
            tail -120 build.log
            exit "$status"
          fi
          tail -40 build.log

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: PianoPath-v0.2-build-log
          path: build.log
          if-no-files-found: ignore
          retention-days: 7

      - name: Prepare downloadable APK
        run: cp app/build/outputs/apk/debug/app-debug.apk PianoPath-v0.2.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: PianoPath-v0.2-APK
          path: PianoPath-v0.2.apk
          if-no-files-found: error
          retention-days: 30
