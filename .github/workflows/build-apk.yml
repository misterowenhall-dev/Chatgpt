name: Build PianoPath APK

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.9'

      - name: Install Android SDK 35
        run: yes | sdkmanager "platforms;android-35" "build-tools;35.0.0"

      - name: Build debug APK
        run: gradle --no-daemon assembleDebug

      - name: Prepare downloadable APK
        run: cp app/build/outputs/apk/debug/app-debug.apk PianoPath-v0.1.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: PianoPath-v0.1-APK
          path: PianoPath-v0.1.apk
          if-no-files-found: error
          retention-days: 30
